version: "3.8"

services:
  n8n:
    build: .
    container_name: n8n
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"

    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://apse1.pa.auto.useprivate.ai/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_SECURE_COOKIE=false
      - N8N_REVERSE_PROXY=${N8N_REVERSE_PROXY}
      - N8N_DISABLE_PRODUCTION_WORKFLOWS=${N8N_DISABLE_PRODUCTION_WORKFLOWS}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE}

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
